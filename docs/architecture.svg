<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" role="img" aria-labelledby="arch-title">
  <title id="arch-title">tabishioriの構成図。UI層が編集・しおり・共有の3モードを描画し、ロジック層の4モジュールがしおりのデータを扱う。保存先はlocalStorageと共有URLの2系統。</title>
  <style>
    .box { fill: #fdfdfb; stroke: #dde1d8; stroke-width: 1.5; }
    .layer { fill: #f4f5f1; stroke: #dde1d8; stroke-width: 1.5; }
    .chip { fill: #e2ecf3; stroke: none; }
    .name { fill: #23282b; font: 600 15px system-ui, sans-serif; }
    .label { fill: #66707a; font: 13px system-ui, sans-serif; }
    .chip-text { fill: #2f6690; font: 600 13px system-ui, sans-serif; }
    .layer-name { fill: #2f6690; font: 700 13px system-ui, sans-serif; letter-spacing: 0.08em; }
    .edge { stroke: #66707a; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
    .edge-label { fill: #66707a; font: 12px system-ui, sans-serif; }
    #arrow path { fill: #66707a; }
    @media (prefers-color-scheme: dark) {
      .box { fill: #20241f; stroke: #343a33; }
      .layer { fill: #171a17; stroke: #343a33; }
      .chip { fill: #243341; }
      .name { fill: #e7eae3; }
      .label { fill: #9aa49b; }
      .chip-text { fill: #7fb3d8; }
      .layer-name { fill: #7fb3d8; }
      .edge { stroke: #9aa49b; }
      .edge-label { fill: #9aa49b; }
      #arrow path { fill: #9aa49b; }
    }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z"/>
    </marker>
  </defs>

  <rect class="layer" x="40" y="32" width="800" height="128" rx="14"/>
  <text class="layer-name" x="64" y="60">UI層(app.ts / main.ts)</text>
  <text class="label" x="64" y="82">ハッシュで3つのモードを切り替え、変更はchangeイベントで確定して描き直す</text>
  <rect class="chip" x="64" y="100" width="120" height="32" rx="16"/>
  <text class="chip-text" x="124" y="121" text-anchor="middle">編集 #/</text>
  <rect class="chip" x="196" y="100" width="140" height="32" rx="16"/>
  <text class="chip-text" x="266" y="121" text-anchor="middle">しおり #/shiori</text>
  <rect class="chip" x="348" y="100" width="130" height="32" rx="16"/>
  <text class="chip-text" x="413" y="121" text-anchor="middle">共有 #s=...</text>

  <path class="edge" d="M150 160 V224"/>
  <path class="edge" d="M345 160 V224"/>
  <path class="edge" d="M540 160 V224"/>
  <path class="edge" d="M730 160 V224"/>

  <rect class="box" x="60" y="228" width="180" height="96" rx="14"/>
  <text class="name" x="150" y="262" text-anchor="middle">trip.ts</text>
  <text class="label" x="150" y="286" text-anchor="middle">しおりの型・検証・</text>
  <text class="label" x="150" y="306" text-anchor="middle">日付計算・永続化</text>

  <rect class="box" x="255" y="228" width="180" height="96" rx="14"/>
  <text class="name" x="345" y="262" text-anchor="middle">time.ts</text>
  <text class="label" x="345" y="286" text-anchor="middle">「9時30分」を読んで</text>
  <text class="label" x="345" y="306" text-anchor="middle">正規化・時刻順に整列</text>

  <rect class="box" x="450" y="228" width="180" height="96" rx="14"/>
  <text class="name" x="540" y="262" text-anchor="middle">budget.ts</text>
  <text class="label" x="540" y="286" text-anchor="middle">金額の解釈と</text>
  <text class="label" x="540" y="306" text-anchor="middle">費目別の集計</text>

  <rect class="box" x="645" y="228" width="180" height="96" rx="14"/>
  <text class="name" x="735" y="262" text-anchor="middle">share.ts</text>
  <text class="label" x="735" y="286" text-anchor="middle">しおりをbase64urlで</text>
  <text class="label" x="735" y="306" text-anchor="middle">URLに埋め込み・復元</text>

  <path class="edge" d="M150 324 V388"/>
  <text class="edge-label" x="162" y="362">保存・復元</text>
  <path class="edge" d="M735 324 V388"/>
  <text class="edge-label" x="747" y="362">共有リンク</text>

  <rect class="box" x="60" y="392" width="180" height="48" rx="14"/>
  <text class="name" x="150" y="421" text-anchor="middle">localStorage</text>

  <rect class="box" x="645" y="392" width="180" height="48" rx="14"/>
  <text class="name" x="735" y="421" text-anchor="middle">URLハッシュ</text>
</svg>
